<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>双人雷霆战机修仙版 v0.1</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, "Microsoft YaHei", "PingFang SC", sans-serif;
        background: #050712;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #050712;
      }

      button {
        border: 1px solid rgba(34, 211, 238, 0.55);
        border-radius: 6px;
        background: rgba(15, 23, 42, 0.88);
        color: #f8fafc;
        cursor: pointer;
        font: inherit;
        min-height: 34px;
        padding: 6px 10px;
      }

      button:hover {
        border-color: #facc15;
        background: rgba(30, 41, 59, 0.95);
      }

      .xiuxian-shell {
        background: #050712;
        height: 100vh;
        inset: 0;
        overflow: hidden;
        position: fixed;
        width: 100vw;
      }

      .xiuxian-playfield {
        background: #050712;
        inset: 0;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        position: absolute;
      }

      .xiuxian-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .xiuxian-hud {
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(260px, 320px) minmax(0, 1fr) minmax(260px, 320px);
        left: 18px;
        pointer-events: none;
        position: absolute;
        right: 18px;
        top: 16px;
        z-index: 5;
      }

      .xiuxian-hud-overlay {
        align-items: start;
      }

      .hud-panel {
        background: linear-gradient(135deg, rgba(8, 15, 28, 0.84), rgba(17, 24, 39, 0.58));
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 8px;
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.12);
        min-width: 0;
        overflow: hidden;
        padding: 10px 12px;
      }

      .hud-player-p1 {
        border-color: rgba(34, 211, 238, 0.58);
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.18);
      }

      .hud-player-p2 {
        border-color: rgba(217, 70, 239, 0.58);
        box-shadow: 0 0 18px rgba(217, 70, 239, 0.18);
        grid-column: 3;
      }

      .hud-stage {
        border-color: rgba(52, 211, 153, 0.5);
        grid-column: 2;
        text-align: center;
      }

      .xiuxian-debug {
        display: flex;
        gap: 8px;
        left: 18px;
        min-width: 0;
        pointer-events: auto;
        position: absolute;
        bottom: 18px;
        z-index: 8;
      }

      .xiuxian-outgame {
        background: rgba(2, 6, 23, 0.88);
        border: 1px solid rgba(250, 204, 21, 0.55);
        border-radius: 8px;
        box-shadow: 0 0 32px rgba(250, 204, 21, 0.16);
        left: 50%;
        max-width: 680px;
        padding: 18px 22px;
        pointer-events: auto;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(680px, calc(100vw - 48px));
        z-index: 12;
      }

      .xiuxian-outgame[hidden] {
        display: none;
      }

      .hud-title {
        color: #fde68a;
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 8px;
        text-shadow: 0 0 12px currentColor;
      }

      .hud-section {
        display: grid;
        gap: 7px;
      }

      .hud-alert {
        color: #b7f2cf;
      }

      .hud-row {
        align-items: center;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        min-height: 21px;
      }

      .hud-row span {
        color: #94a3b8;
        min-width: 0;
      }

      .hud-row strong {
        color: #f8fafc;
        font-weight: 650;
        min-width: 0;
        overflow-wrap: anywhere;
        text-align: right;
      }

      .hud-meter {
        margin: 6px 0;
      }

      .hud-meter-track {
        background: rgba(15, 23, 42, 0.86);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 4px;
        height: 9px;
        overflow: hidden;
      }

      .hud-meter-track i {
        display: block;
        height: 100%;
      }

      .hud-meter-hp i {
        background: linear-gradient(90deg, #fb7185, #fecdd3);
      }

      .hud-meter-qi i {
        background: linear-gradient(90deg, #38bdf8, #e0f2fe);
      }

      .hud-meter-cultivation i {
        background: linear-gradient(90deg, #facc15, #fef3c7);
      }

      .hud-meter-insight i {
        background: linear-gradient(90deg, #34d399, #bbf7d0);
      }
    </style>
  </head>
  <body>
    <main id="xiuxian-game-root"></main>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
